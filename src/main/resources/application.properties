scheduler.type=leaking_bucket

# TOKEN BUCKET RATE LIMITER PROPERTIES
#
# bucketSize: max tokens (= burst capacity / requests allowed before limiting)
# interval:   refill period in milliseconds
# refillSize: tokens added each interval
#
# Current: 10 burst, then refills 2 tokens every 2s (= 1 req/sec sustained).
# Kept deliberately slow so sequential test traffic actually hits the limit.

tokenbucket.bucketSize=10
tokenbucket.interval=2000
tokenbucket.refillSize=2


# FIXED WINDOW RATE LIMITER PROPERTIES
#
# noOfRequests: max requests allowed per window
# interval:     window length in milliseconds (counter resets to 0 each interval)
#
# Current: 10 requests per 2s window. The whole allowance comes back at once
# when the window resets (unlike token bucket's gradual drip).
fixedWindow.noOfRequests = 10
fixedWindow.interval = 2000


# LEAKING BUCKET RATE LIMITER PROPERTIES
#
# queueSize:     bucket capacity = burst allowed before requests are rejected
# interval:      how often the bucket leaks (in milliseconds)
# noOfRequests:  how many slots are freed (leaked) each interval
#
# Current: holds 10, leaks 5 every 2s. So a burst fills 10, then only 5 slots
# come back per 2s window (unlike fixed window where the whole allowance resets).
leakingBucket.queueSize=10
leakingBucket.interval=2000
leakingBucket.noOfRequests=5


#SLIDING WINDOW LOG RATE LIMITER PROPERTIES
slidingWindowLog.interval=2000
slidingWindowLog.noOfRequests=10

#SLIDING WINDOW COUNTER RATE LIMITER PROPERTIES
slidingWindowCounter.interval=2000
slidingWindowCounter.noOfRequests=10