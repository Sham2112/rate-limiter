# TOKEN BUCKET RATE LIMITER PROPERTIES
#
# bucketSize: max tokens (= burst capacity / requests allowed before limiting)
# interval:   refill period in milliseconds
# refillSize: tokens added each interval
#
# Current: 10 burst, then refills 2 tokens every 2s (= 1 req/sec sustained).
# Kept deliberately slow so sequential test traffic actually hits the limit.

tokenbucket.bucketSize=10
tokenbucket.interval=2000
tokenbucket.refillSize=2
